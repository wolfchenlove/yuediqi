<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>艺愈系阅读器 
        公众号搜《艺愈系》</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{
            height:100%;
            overflow:hidden;
            font-family:"微软雅黑",sans-serif;
            background:#f5f6f7;
        }
        body{
            display:flex;
            flex-direction:column;
            transition:all 0.3s ease;
        }
        .header{
            background:#fff;
            color:#333;
            text-align:center;
            padding:12px 8px;
            font-size:18px;
            font-weight:bold;
            border-bottom:1px solid #e0e0e0;
            z-index:10;
        }
        .main-body{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }
        .main-wrap{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }
        .toolbar{
            background:#fff;
            padding:8px;
            display:flex;
            gap:6px;
            flex-wrap:nowrap;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
            border-bottom:1px solid #e0e0e0;
        }
        .toolbar::-webkit-scrollbar{display:none;}
        button{
            padding:8px 12px;
            border:none;
            border-radius:8px;
            background:#2E86AB;
            color:#fff;
            font-size:14px;
            flex-shrink:0;
        }
        button:active{background:#1e5d7c;}
        .stat-bar{
            background:#f0f4f8;
            padding:6px;
            text-align:center;
            font-size:13px;
            border-bottom:1px solid #e0e0e0;
        }
        .search-box{
            padding:8px;
            background:#f0f4f8;
            display:flex;
            gap:6px;
            flex-wrap:wrap;
            border-bottom:1px solid #e0e0e0;
        }
        select,input{
            padding:8px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:14px;
            flex:1;
            min-width:120px;
        }
        #fileInput{display:none;}

        /* 核心：阅读区可正常上下滑动 */
        .read-box{
            flex:1;
            margin:8px;
            padding:15px;
            background:#fff;
            border-radius:12px;
            line-height:2;
            white-space:pre-wrap;
            user-select:text;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            outline:none;
        }

        /* 翻译面板：底部折叠，不抢滚动 */
        .trans-panel{
            width:100%;
            max-height:0;
            transition:max-height 0.3s ease;
            background:#fff;
            border-top:1px solid #e0e0e0;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }
        .trans-panel.open{
            max-height:40vh;
        }
        .trans-head{
            padding:8px 12px;
            font-weight:bold;
        }
        .trans-result{
            flex:1;
            margin:0 12px 12px;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            background:#fafafa;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
        }
        .trans-toggle{
            position:fixed;
            bottom:16px;
            right:16px;
            width:48px;
            height:48px;
            border-radius:50%;
            background:#2E86AB;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            z-index:20;
        }

        .pair-block{margin:8px 0;padding:8px;border-bottom:1px dotted #eee;}
        .orig{margin-bottom:6px;}
        .trans{color:#2E86AB;}

        .light{background:#f5f6f7;color:#333;}
        .dark{background:#121212;color:#eee;}
        .dark .header,.dark .toolbar,.dark .stat-bar,.dark .search-box,.dark .trans-panel{background:#1e1e1e;border-color:#333;}
        .dark .read-box{background:#1e1e1e;}
        .dark .trans-result{background:#2d2d2d;border-color:#444;}

        .loading{color:#999;font-style:italic;}
        .error{color:#e74c3c;}
    </style>
</head>
<body class="light">
<div class="header">艺愈系简洁阅读器 手机版</div>

<div class="main-body">
    <div class="main-wrap">
        <div class="toolbar">
            <button onclick="document.getElementById('fileInput').click()">打开文档</button>
            <button onclick="exportText()">导出文本</button>
            <button onclick="fontUp()">放大字体</button>
            <button onclick="fontDown()">缩小字体</button>
            <button onclick="toggleDark()">昼夜模式</button>
            <button onclick="alignLeft()">左对齐</button>
            <button onclick="alignCenter()">居中</button>
            <button onclick="alignRight()">右对齐</button>
            <button onclick="checkErrorWords()">错别字</button>
            <button onclick="switchEdit()">编辑</button>
            <select id="fullTransLang">
                <option value="zh">中文</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="ru">俄语</option>
                <option value="fr">法语</option>
                <option value="pt">葡萄牙语</option>
                <option value="ar">阿拉伯语</option>
            </select>
            <button onclick="fullTranslate()" style="background:#27ae60;">全文翻译</button>
            <select id="fontSelect"></select>
            <input type="color" id="textColor" title="字体颜色">
            <input type="file" id="fileInput" accept=".wps,.docx,.txt">
        </div>

        <div class="search-box">
            <input type="text" id="findVal" placeholder="查找内容">
            <input type="text" id="replaceVal" placeholder="替换为">
            <button onclick="findText()">查找</button>
            <button onclick="replaceAll()">替换</button>
        </div>

        <div class="stat-bar">全文总字数：<span id="wordCount">0</span> 字</div>

        <div class="read-box" id="reader" contenteditable="false">
欢迎使用艺愈系简洁阅读器 手机版
支持WPS(.wps)、Word(.docx)、TXT文档
仿WPS界面，简洁清爽
公网稳定翻译，对照显示
字体/颜色/排版自定义
        </div>
    </div>

    <div class="trans-panel" id="transPanel">
        <div class="trans-head">原文 ↓ 译文对照</div>
        <div class="trans-result" id="transResult">翻译结果将在此显示</div>
    </div>
</div>

<div class="trans-toggle" id="transToggleBtn" onclick="toggleTransPanel()">↑</div>

<script>
const fonts = ["微软雅黑","宋体","黑体","楷体","隶书","幼圆","仿宋"];
const reader = document.getElementById("reader");
const fontSel = document.getElementById("fontSelect");
const wordCountDom = document.getElementById("wordCount");
const transResult = document.getElementById("transResult");
const transPanel = document.getElementById("transPanel");
const transToggleBtn = document.getElementById("transToggleBtn");

let fontSize = 17;
let darkMode = false;
let editStatus = false;
let textColor = "#333";

const langMap = {
    "zh":"zh","en":"en","ja":"ja","ko":"ko",
    "ru":"ru","fr":"fr","pt":"pt","ar":"ar"
};

fonts.forEach(f=>{
    const opt = document.createElement("option");
    opt.value = f; opt.innerText = f;
    fontSel.appendChild(opt);
});

function applyColor(){ reader.style.color = textColor; }
function countWord(){
    const text = reader.innerText.replace(/\s/g,"");
    wordCountDom.innerText = text.length;
}

// 文件读取
document.getElementById('fileInput').addEventListener('change',e=>{
    const file = e.target.files[0]; if(!file) return;
    const name = file.name.toLowerCase();
    const fr = new FileReader();
    if(name.endsWith(".wps")||name.endsWith(".docx")){
        fr.readAsArrayBuffer(file);
        fr.onload=ev=>{
            mammoth.extractRawText({arrayBuffer:ev.target.result})
            .then(res=>{
                reader.innerText=res.value;
                applyColor(); countWord();
            })
            .catch(()=>reader.innerText="文档解析失败");
        };
    }else{
        fr.readAsArrayBuffer(file);
        fr.onload=ev=>{
            const buf=new Uint8Array(ev.target.result);
            let t;
            try{t=new TextDecoder("utf-8",{fatal:true}).decode(buf);}
            catch{e=>{
                try{t=new TextDecoder("gbk").decode(buf);}
                catch{e2=>t=new TextDecoder("gb2312").decode(buf);}
            }}
            reader.innerText=t;
            applyColor(); countWord();
        };
    }
});

function exportText(){
    const blob=new Blob([reader.innerText],{type:"text/plain;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="艺愈阅读器文稿.txt";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function alignLeft(){reader.style.textAlign="left";}
function alignCenter(){reader.style.textAlign="center";}
function alignRight(){reader.style.textAlign="right";}

function fontUp(){if(fontSize<40) fontSize++; reader.style.fontSize=fontSize+"px";}
function fontDown(){if(fontSize>12) fontSize--; reader.style.fontSize=fontSize+"px";}

function toggleDark(){
    darkMode=!darkMode;
    document.body.className=darkMode?"dark":"light";
    applyColor();
}

function switchEdit(){
    editStatus=!editStatus;
    reader.contentEditable=editStatus;
    alert(editStatus?"已开启编辑":"已关闭编辑");
}

function checkErrorWords(){
    let text=reader.innerText;
    const fix={
        "即然":"既然","既使":"即使","渡过":"度过","年青":"年轻",
        "决对":"绝对","以经":"已经","在次":"再次","到至":"导致"
    };
    let cnt=0;
    for(let k in fix){
        const reg=new RegExp(k,"g");
        const m=text.match(reg); if(m) cnt+=m.length;
        text=text.replace(reg,fix[k]);
    }
    reader.innerText=text;
    applyColor(); countWord();
    alert(`修正 ${cnt} 处`);
}

function findText(){
    const k=document.getElementById("findVal").value.trim();
    if(!k) return alert("请输入查找内容");
    const reg=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    const text=reader.innerText;
    if(text.match(reg)){
        reader.innerHTML=text.replace(reg,`<span style="background:#ffeb3b;">${k}</span>`);
        alert(`找到 ${(text.match(reg)||[]).length} 处`);
    }else alert("未找到");
}

function replaceAll(){
    const f=document.getElementById("findVal").value.trim();
    const r=document.getElementById("replaceVal").value;
    if(!f) return alert("请输入查找内容");
    const reg=new RegExp(f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    const text=reader.innerText;
    const cnt=(text.match(reg)||[]).length;
    reader.innerText=text.replace(reg,r);
    applyColor(); countWord();
    alert(`替换 ${cnt} 处`);
}

fontSel.onchange=()=>reader.style.fontFamily=fontSel.value;
document.getElementById('textColor').onchange=()=>{
    textColor=document.getElementById('textColor').value;
    applyColor();
};

function toggleTransPanel(){
    transPanel.classList.toggle("open");
    transToggleBtn.innerText=transPanel.classList.contains("open")?"↓":"↑";
}

async function translateText(text,targetLang){
    const proxy="https://api.allorigins.win/raw?url=";
    const api="https://fanyi.volcengine.com/api/v1/translate";
    const params={text,source_language:"auto",target_language:targetLang};
    for(let i=0;i<3;i++){
        try{
            const res=await fetch(proxy+encodeURIComponent(api),{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(params)
            });
            const d=await res.json();
            if(d&&d.translation) return d.translation;
        }catch(e){
            if(i===2) throw e;
            await new Promise(r=>setTimeout(r,1000*(i+1)));
        }
    }
    throw new Error("翻译失败");
}

async function fullTranslate(){
    const text=reader.innerText.trim();
    if(!text) return alert("请先输入文本");
    const targetLang=langMap[document.getElementById("fullTransLang").value]||"en";
    transResult.innerHTML='<div class="loading">翻译中...</div>';
    transPanel.classList.add("open");
    transToggleBtn.innerText="↓";

    const sentences=text.split(/([。！？；.!?;\n])/).filter(s=>s.trim()).reduce((a,c)=>{
        if(a.length===0) return [c];
        const last=a[a.length-1];
        if(/[。！？；.!?;]/.test(last.slice(-1))) a.push(c);
        else a[a.length-1]+=c;
        return a;
    },[]);

    let html="", ok=0;
    const batch=5; let idx=0;

    async function run(){
        if(idx>=sentences.length){
            transResult.innerHTML=html;
            alert(`完成：${sentences.length}句，成功${ok}句`);
            return;
        }
        const end=Math.min(idx+batch,sentences.length);
        for(let i=idx;i<end;i++){
            const s=sentences[i].trim(); if(!s) continue;
            try{
                const t=await translateText(s,targetLang);
                html+=`<div class="pair-block"><div class="orig">${s}</div><div class="trans">${t}</div></div>`;
                ok++;
            }catch(e){
                html+=`<div class="pair-block"><div class="orig">${s}</div><div class="trans error">${e.message}</div></div>`;
            }
        }
        transResult.innerHTML=`<div class="loading">进度 ${end}/${sentences.length}</div><br>${html}`;
        idx=end;
        setTimeout(run,100);
    }
    run();
}

window.onload=()=>{
    applyColor();
    countWord();
    reader.style.fontSize=fontSize+"px";
};
</script>
</body>
</html>
