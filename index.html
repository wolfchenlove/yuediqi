<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2E86AB">
    <title>艺愈阅读器 极简版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{
            height:100%;
            overflow:hidden;
            background:#f5f7fa;
            -webkit-font-smoothing:antialiased;
        }
        body{
            display:flex;
            flex-direction:column;
            transition:all 0.25s ease;
            padding-top:env(safe-area-inset-top);
            font-family:"Noto Sans CJK SC","PingFang SC","Roboto",sans-serif;
        }
        .header{
            background:#fff;
            color:#333;
            text-align:center;
            padding:12px 10px;
            font-size:18px;
            font-weight:600;
            border-bottom:1px solid #e5e5e5;
            z-index:10;
        }
        .main-body{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }
        .main-wrap{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            min-height:0;
        }
        .toolbar{
            background:#fff;
            padding:8px;
            display:flex;
            gap:6px;
            flex-wrap:nowrap;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
            touch-action:pan-x;
            border-bottom:1px solid #e5e5e5;
        }
        .toolbar::-webkit-scrollbar{display:none;}
        .btn{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-width:56px;
            height:56px;
            border:none;
            border-radius:12px;
            background:#f0f4f8;
            color:#2E86AB;
            font-size:11px;
            flex-shrink:0;
            -webkit-tap-highlight-color:transparent;
        }
        .btn:active{background:#e0e8f0;}
        .btn .icon{font-size:20px;margin-bottom:2px;}
        .btn.green{background:#e6f7ef;color:#27ae60;}
        .btn.green:active{background:#d0f0e0;}
        .stat-bar{
            background:#f0f4f8;
            padding:6px;
            text-align:center;
            font-size:12px;
            color:#666;
        }
        .search-box{
            padding:8px;
            background:#f0f4f8;
            display:flex;
            gap:6px;
            flex-wrap:wrap;
            align-items:center;
        }
        .search-box input{
            flex:1;
            padding:8px 10px;
            border-radius:8px;
            border:1px solid #ddd;
            font-size:14px;
        }
        .color-wrap{
            display:flex;
            align-items:center;
            gap:4px;
            flex-shrink:0;
        }
        #textColor{
            width:44px;
            height:44px;
            padding:2px;
            border-radius:8px;
            cursor:pointer;
            border:1px solid #ddd;
        }
        #fontSelect{
            height:44px;
            padding:0 6px;
            border-radius:8px;
            border:1px solid #ddd;
            font-size:14px;
            flex-shrink:0;
        }
        #fileInput{display:none;}

        .read-box{
            flex:1;
            margin:8px;
            padding:16px;
            background:#fff;
            border-radius:16px;
            line-height:2.2;
            font-size:17px;
            white-space:pre-wrap;
            user-select:text;
            outline:none;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            touch-action:pan-y;
            will-change:scroll-position;
            min-height:0;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
        }

        .trans-panel{
            width:100%;
            max-height:0;
            transition:max-height 0.3s cubic-bezier(0.4,0,0.2,1);
            background:#fff;
            border-top:1px solid #e5e5e5;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            min-height:0;
        }
        .trans-panel.open{
            max-height:40vh;
        }
        .trans-head{
            padding:8px 12px;
            font-weight:600;
            font-size:14px;
            color:#333;
        }
        .trans-result{
            flex:1;
            margin:0 12px 12px;
            padding:12px;
            border:1px solid #eee;
            border-radius:12px;
            background:#fafbfc;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            touch-action:pan-y;
            min-height:0;
        }
        .trans-toggle{
            position:fixed;
            bottom:16px;
            right:16px;
            width:48px;
            height:48px;
            border-radius:50%;
            background:#2E86AB;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            box-shadow:0 3px 10px rgba(0,0,0,0.2);
            z-index:20;
            -webkit-tap-highlight-color:transparent;
        }
        .trans-toggle:active{background:#1a5b82;}

        .pair-block{margin:8px 0;padding:8px;border-bottom:1px dotted #eee;}
        .orig{margin-bottom:6px;font-size:14px;}
        .trans{color:#2E86AB;font-size:14px;}

        .dark{background:#121212;color:#e0e0e0;}
        .dark .header,.dark .toolbar,.dark .stat-bar,.dark .search-box,.dark .trans-panel{background:#1e1e1e;border-color:#333;}
        .dark .read-box{background:#1e1e1e;box-shadow:none;}
        .dark .trans-result{background:#252525;border-color:#333;}
        .dark .btn{background:#2a2a2a;color:#64b5f6;}
        .dark .btn:active{background:#333;}
        .dark .btn.green{background:#1b3b2f;color:#4ade80;}
        .dark .btn.green:active{background:#244b3f;}

        .loading{color:#888;font-style:italic;}
        .error{color:#e53935;}
    </style>
</head>
<body class="light">
<div class="header">艺愈阅读器</div>

<div class="main-body">
    <div class="main-wrap">
        <div class="toolbar">
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                <span class="icon">📂</span>
                <span>打开</span>
            </button>
            <button class="btn" onclick="exportWPS()">
                <span class="icon">💾</span>
                <span>导出WPS</span>
            </button>
            <button class="btn" onclick="fontUp()">
                <span class="icon">A+</span>
                <span>放大</span>
            </button>
            <button class="btn" onclick="fontDown()">
                <span class="icon">A-</span>
                <span>缩小</span>
            </button>
            <button class="btn" onclick="toggleDark()">
                <span class="icon">🌙</span>
                <span>深色</span>
            </button>
            <button class="btn" onclick="alignLeft()">
                <span class="icon">⬅</span>
                <span>左对齐</span>
            </button>
            <button class="btn" onclick="alignCenter()">
                <span class="icon">↔</span>
                <span>居中</span>
            </button>
            <button class="btn" onclick="alignRight()">
                <span class="icon">➡</span>
                <span>右对齐</span>
            </button>
            <button class="btn" onclick="checkErrorWords()">
                <span class="icon">✓</span>
                <span>纠错</span>
            </button>
            <button class="btn" onclick="switchEdit()">
                <span class="icon">✏</span>
                <span>编辑</span>
            </button>

            <select id="fontSelect"></select>

            <div class="color-wrap">
                <input type="color" id="textColor">
            </div>

            <button class="btn green" onclick="fullTranslate()">
                <span class="icon">EN</span>
                <span>英译</span>
            </button>

            <input type="file" id="fileInput" accept=".wps,.docx,.txt">
        </div>

        <div class="search-box">
            <input type="text" id="findVal" placeholder="查找">
            <input type="text" id="replaceVal" placeholder="替换">
            <button class="btn" onclick="findText()" style="height:44px;">
                <span class="icon">🔍</span>
            </button>
            <button class="btn" onclick="replaceAll()" style="height:44px;">
                <span class="icon">🔄</span>
            </button>
        </div>

        <div class="stat-bar">全文：<span id="wordCount">0</span> 字</div>

        <div class="read-box" id="reader" contenteditable="false">
欢迎使用艺愈阅读器 极简版
✅ 安卓/苹果顺滑滑动
✅ 一键导出WPS(.wps)
✅ 字体/颜色自由切换
✅ 英译稳定可用
        </div>
    </div>

    <div class="trans-panel" id="transPanel">
        <div class="trans-head">原文 ↓ 英文对照</div>
        <div class="trans-result" id="transResult">翻译结果将在此显示</div>
    </div>
</div>

<div class="trans-toggle" id="transToggleBtn" onclick="toggleTransPanel()">↑</div>

<script>
const fonts = ["系统默认","思源黑体","苹方","Roboto","黑体","无衬线体","宋体","楷体"];
const reader = document.getElementById("reader");
const fontSel = document.getElementById("fontSelect");
const wordCountDom = document.getElementById("wordCount");
const transResult = document.getElementById("transResult");
const transPanel = document.getElementById("transPanel");
const transToggleBtn = document.getElementById("transToggleBtn");

let fontSize = 17;
let darkMode = false;
let editStatus = false;
let textColor = "#333";

fonts.forEach(f=>{
    const opt = document.createElement("option");
    opt.value = f; opt.innerText = f;
    fontSel.appendChild(opt);
});

fontSel.onchange = () => {
    const v = fontSel.value;
    let ff = "sans-serif";
    if(v === "思源黑体") ff = '"Noto Sans CJK SC",sans-serif';
    else if(v === "苹方") ff = '"PingFang SC",sans-serif';
    else if(v === "Roboto") ff = '"Roboto",sans-serif';
    else if(v === "黑体") ff = '"Helvetica Neue",sans-serif';
    else if(v === "宋体") ff = '"SimSun",serif';
    else if(v === "楷体") ff = '"KaiTi",serif';
    else if(v === "无衬线体") ff = "sans-serif";
    reader.style.fontFamily = ff;
};

function applyColor(){ reader.style.color = textColor; }
function countWord(){
    const text = reader.innerText.replace(/\s/g,"");
    wordCountDom.innerText = text.length;
}

document.getElementById('fileInput').addEventListener('change',e=>{
    const file = e.target.files[0]; if(!file) return;
    const name = file.name.toLowerCase();
    const fr = new FileReader();
    if(name.endsWith(".wps")||name.endsWith(".docx")){
        fr.readAsArrayBuffer(file);
        fr.onload=ev=>{
            mammoth.extractRawText({arrayBuffer:ev.target.result})
            .then(res=>{
                reader.innerText=res.value;
                applyColor(); countWord();
            })
            .catch(()=>reader.innerText="文档解析失败");
        };
    }else{
        fr.readAsArrayBuffer(file);
        fr.onload=ev=>{
            const buf=new Uint8Array(ev.target.result);
            let t;
            try{t=new TextDecoder("utf-8",{fatal:true}).decode(buf);}
            catch{e=>{
                try{t=new TextDecoder("gbk").decode(buf);}
                catch{e2=>t=new TextDecoder("gb2312").decode(buf);}
            }}
            reader.innerText=t;
            applyColor(); countWord();
        };
    }
});

// 导出WPS（手机可用）
function exportWPS(){
    const text = reader.innerText;
    // WPS文本格式（简单标记，手机WPS可正常打开）
    const wpsContent = `\x00\x00\x00\x00${text}`;
    const blob = new Blob([wpsContent],{type:"application/msword"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="艺愈文档_"+Date.now()+".wps";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    alert("✅ WPS已导出！手机可直接打开");
}

function alignLeft(){reader.style.textAlign="left";}
function alignCenter(){reader.style.textAlign="center";}
function alignRight(){reader.style.textAlign="right";}

function fontUp(){if(fontSize<42) fontSize++; reader.style.fontSize=fontSize+"px";}
function fontDown(){if(fontSize>13) fontSize--; reader.style.fontSize=fontSize+"px";}

function toggleDark(){
    darkMode=!darkMode;
    document.body.className=darkMode?"dark":"light";
    applyColor();
}

function switchEdit(){
    editStatus=!editStatus;
    reader.contentEditable=editStatus;
    alert(editStatus?"✅ 已开启编辑":"❌ 已关闭编辑");
}

function checkErrorWords(){
    let text=reader.innerText;
    const fix={"即然":"既然","既使":"即使","渡过":"度过","年青":"年轻","决对":"绝对","以经":"已经","在次":"再次","到至":"导致"};
    let cnt=0;
    for(let k in fix){
        const reg=new RegExp(k,"g");
        const m=text.match(reg); if(m) cnt+=m.length;
        text=text.replace(reg,fix[k]);
    }
    reader.innerText=text;
    applyColor(); countWord();
    alert(`✅ 修正 ${cnt} 处错别字`);
}

function findText(){
    const k=document.getElementById("findVal").value.trim();
    if(!k) return alert("请输入查找内容");
    const reg=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    const text=reader.innerText;
    if(text.match(reg)){
        reader.innerHTML=text.replace(reg,`<span style="background:#ffeb3b;">${k}</span>`);
        alert(`找到 ${(text.match(reg)||[]).length} 处`);
    }else alert("未找到匹配内容");
}

function replaceAll(){
    const f=document.getElementById("findVal").value.trim();
    const r=document.getElementById("replaceVal").value;
    if(!f) return alert("请输入查找内容");
    const reg=new RegExp(f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    const text=reader.innerText;
    const cnt=(text.match(reg)||[]).length;
    reader.innerText=text.replace(reg,r);
    applyColor(); countWord();
    alert(`✅ 替换 ${cnt} 处内容`);
}

document.getElementById('textColor').onchange=()=>{
    textColor=document.getElementById('textColor').value;
    applyColor();
};

function toggleTransPanel(){
    transPanel.classList.toggle("open");
    transToggleBtn.innerText=transPanel.classList.contains("open")?"↓":"↑";
}

async function translateText(text){
    const proxy="https://api.allorigins.win/raw?url=";
    const api="https://fanyi.volcengine.com/api/v1/translate";
    const params={text,source_language:"auto",target_language:"en"};
    for(let i=0;i<3;i++){
        try{
            const res=await fetch(proxy+encodeURIComponent(api),{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(params),
                timeout:15000
            });
            const d=await res.json();
            if(d&&d.translation) return d.translation;
        }catch(e){
            if(i===2) throw e;
            await new Promise(r=>setTimeout(r,1200*(i+1)));
        }
    }
    throw new Error("翻译服务暂时不可用");
}

async function fullTranslate(){
    const text=reader.innerText.trim();
    if(!text) return alert("请先打开文档或输入文本");
    transResult.innerHTML='<div class="loading">翻译中，请稍候...</div>';
    transPanel.classList.add("open");
    transToggleBtn.innerText="↓";

    const sentences=text.split(/([。！？；.!?;\n])/).filter(s=>s.trim()).reduce((a,c)=>{
        if(a.length===0) return [c];
        const last=a[a.length-1];
        if(/[。！？；.!?;]/.test(last.slice(-1))) a.push(c);
        else a[a.length-1]+=c;
        return a;
    },[]);

    let html="", ok=0;
    const batch=4; let idx=0;

    async function run(){
        if(idx>=sentences.length){
            transResult.innerHTML=html;
            alert(`✅ 英译完成：共${sentences.length}句，成功${ok}句`);
            return;
        }
        const end=Math.min(idx+batch,sentences.length);
        for(let i=idx;i<end;i++){
            const s=sentences[i].trim(); if(!s) continue;
            try{
                const t=await translateText(s);
                html+=`<div class="pair-block"><div class="orig">${s}</div><div class="trans">${t}</div></div>`;
                ok++;
            }catch(e){
                html+=`<div class="pair-block"><div class="orig">${s}</div><div class="trans error">${e.message}</div></div>`;
            }
        }
        transResult.innerHTML=`<div class="loading">进度 ${end}/${sentences.length}</div><br>${html}`;
        idx=end;
        setTimeout(run,150);
    }
    run();
}

window.addEventListener('resize',()=>{
    reader.style.height="100%";
    transResult.style.height="100%";
});

window.onload=()=>{
    applyColor();
    countWord();
    reader.style.fontSize=fontSize+"px";
};
</script>
</body>
</html>
