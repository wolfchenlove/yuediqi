<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2E86AB">
    <title>艺愈阅读器｜极简伸缩版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{
            height:100%;
            overflow:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body.bg-white{background:#f9f9f9;color:#333;}
        body.bg-green{background:#e6f5e6;color:#333;}
        body.bg-blue{background:#e6f2f8;color:#333;}
        body{
            display:flex;
            flex-direction:column;
            transition:all 0.25s ease;
            padding-top:env(safe-area-inset-top);
            font-family:"Noto Sans CJK SC","PingFang SC","Roboto",sans-serif;
        }
        .header{
            background:#fff;
            color:#333;
            text-align:center;
            padding:12px;
            font-size:17px;
            font-weight:600;
            border-bottom:1px solid #eee;
            z-index:10;
        }
        .main-body{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }
        .main-wrap{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            min-height:0;
        }
        /* 伸缩设置：所有按钮放这里 */
        .settings{
            max-height:0;
            overflow:hidden;
            background:#fff;
            transition:max-height 0.3s ease;
            border-bottom:1px solid #eee;
        }
        .settings.open{max-height:320px;}
        .toggle-set{
            width:100%;
            text-align:center;
            padding:10px;
            background:#fff;
            border:none;
            font-size:15px;
            color:#2E86AB;
            border-bottom:1px solid #eee;
        }
        .btn-row{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            padding:10px;
            justify-content:center;
        }
        .btn{
            width:44px;
            height:44px;
            border:none;
            border-radius:12px;
            background:#f5f7fa;
            color:#2E86AB;
            font-size:18px;
            display:flex;
            align-items:center;
            justify-content:center;
            -webkit-tap-highlight-color:transparent;
        }
        .btn.green{background:#e6f7ef;color:#27ae60;}
        .btn:active{background:#e5e8ed;}
        .set-row{
            display:flex;
            align-items:center;
            padding:10px;
            gap:10px;
            flex-wrap:wrap;
            justify-content:center;
        }
        /* 美化颜色按钮 */
        .color-btn{
            width:38px;
            height:38px;
            border-radius:50%;
            border:2px solid #fff;
            box-shadow:0 2px 5px rgba(0,0,0.1);
            cursor:pointer;
        }
        .color-btn.active{
            box-shadow:0 0 0 2px #2E86AB;
        }
        #customColor{
            width:38px;
            height:38px;
            border-radius:50%;
            border:none;
            cursor:pointer;
            padding:0;
        }
        select{
            height:38px;
            padding:0 8px;
            border-radius:8px;
            border:1px solid #ddd;
            flex:1;
            min-width:120px;
        }
        .search-box{
            padding:8px;
            background:#fff;
            display:flex;
            gap:6px;
            align-items:center;
            border-bottom:1px solid #eee;
        }
        .search-box input{
            flex:1;
            height:40px;
            padding:0 10px;
            border-radius:6px;
            border:1px solid #ddd;
        }
        .search-btn{
            width:40px;
            height:40px;
            border-radius:6px;
            background:#f5f7fa;
            border:none;
            color:#2E86AB;
        }
        .stat-bar{
            padding:6px;
            text-align:center;
            font-size:12px;
            color:#666;
            background:#fff;
            border-bottom:1px solid #eee;
        }
        /* 核心：完美换行 */
        .read-box{
            flex:1;
            padding:16px;
            line-height:2.2;
            font-size:17px;
            white-space:pre-wrap !important;
            word-wrap:break-word !important;
            overflow-wrap:break-word !important;
            user-select:text;
            outline:none;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            touch-action:pan-y;
            min-height:0;
            background:transparent;
        }
        /* 深色模式 */
        .dark{background:#121212 !important;color:#e0e0e0;}
        .dark .header,.dark .settings,.dark .search-box,.dark .stat-bar{
            background:#1e1e1e !important; border-color:#333;
        }
        .dark .btn{background:#2a2a2a;color:#81bfff;}
        .dark .btn.green{background:#1f4032;color:#5aff8a;}
        .dark input,.dark select{background:#2a2a2a;color:#fff;border-color:#444;}
        #fileInput{display:none;}
    </style>
</head>
<body class="bg-white">
<div class="header">艺愈阅读器｜极简伸缩版</div>

<div class="main-body">
    <div class="main-wrap">
        <!-- 伸缩设置：所有按钮在这里 -->
        <button class="toggle-set" onclick="toggleSettings()">⚙ 展开功能</button>
        <div class="settings" id="settings">
            <div class="btn-row">
                <button class="btn" onclick="openFile()">📂</button>
                <button class="btn green" onclick="saveLocal()">💾</button>
                <button class="btn" onclick="printDoc()">🖨</button>
                <button class="btn" onclick="fontUp()">+</button>
                <button class="btn" onclick="fontDown()">-</button>
                <button class="btn" onclick="toggleDark()">🌙</button>
                <button class="btn" onclick="alignLeft()">◀</button>
                <button class="btn" onclick="alignCenter()">≡</button>
                <button class="btn" onclick="alignRight()">▶</button>
                <button class="btn" onclick="switchEdit()" id="editBtn">📝</button>
                <button class="btn" onclick="checkErrorWords()">✓</button>
            </div>
            <div class="set-row">
                <select id="fontSelect"></select>
                <div class="color-btn active" style="background:#333" onclick="setText('#333')"></div>
                <div class="color-btn" style="background:#666" onclick="setText('#666')"></div>
                <div class="color-btn" style="background:#d32f2f" onclick="setText('#d32f2f')"></div>
                <input type="color" id="customColor" onchange="setText(this.value)">
                <div class="color-btn" style="background:#f9f9f9" onclick="setBg('bg-white')"></div>
                <div class="color-btn" style="background:#e6f5e6" onclick="setBg('bg-green')"></div>
                <div class="color-btn" style="background:#e6f2f8" onclick="setBg('bg-blue')"></div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="findVal" placeholder="查找">
            <input type="text" id="replaceVal" placeholder="替换">
            <button class="search-btn" onclick="findText()">🔍</button>
            <button class="search-btn" onclick="replaceAll()">🔄</button>
        </div>

        <div class="stat-bar">字数：<span id="wordCount">0</span></div>

        <div class="read-box" id="reader" contenteditable="false">
欢迎使用艺愈阅读器
✅ 所有按钮折叠，界面干净
✅ 支持打印（安卓/苹果）
✅ 完美换行、不乱码
✅ WPS可打开、顺滑阅读
</div>
    </div>
</div>

<input type="file" id="fileInput" accept=".wps,.docx,.doc,.txt">

<script>
const fonts = ["系统默认","思源黑体","苹方","Roboto","黑体","宋体","楷体"];
const reader = document.getElementById("reader");
const fontSel = document.getElementById("fontSelect");
const wordCountDom = document.getElementById("wordCount");
const settings = document.getElementById("settings");
const editBtn = document.getElementById("editBtn");

let fontSize = 17;
let darkMode = false;
let editStatus = false;
let textColor = "#333";
let currentBg = "bg-white";
let settingsOpen = false;

fonts.forEach(f=>{
    const opt = document.createElement("option");
    opt.value = f; opt.innerText = f;
    fontSel.appendChild(opt);
});

fontSel.onchange = () => {
    const v = fontSel.value;
    let ff = "sans-serif";
    if(v === "思源黑体") ff = '"Noto Sans CJK SC",sans-serif';
    else if(v === "苹方") ff = '"PingFang SC",sans-serif';
    else if(v === "Roboto") ff = '"Roboto",sans-serif';
    else if(v === "黑体") ff = '"Helvetica Neue",sans-serif';
    else if(v === "宋体") ff = '"SimSun",serif';
    else if(v === "楷体") ff = '"KaiTi",serif';
    reader.style.fontFamily = ff;
};

function applyColor(){ reader.style.color = textColor; }
function countWord(){
    const t = reader.innerText.replace(/\s/g,"");
    wordCountDom.innerText = t.length;
}
function setBg(cls){
    currentBg = cls;
    document.body.className = cls + (darkMode ? "dark" : "");
}
function setText(c){
    textColor = c;
    applyColor();
}
function toggleSettings(){
    settingsOpen = !settingsOpen;
    settings.classList.toggle("open", settingsOpen);
    document.querySelector(".toggle-set").innerText = settingsOpen ? "▲ 收起功能" : "⚙ 展开功能";
}
function openFile(){ document.getElementById("fileInput").click(); }

// 读取文件（保留换行）
document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const name = file.name.toLowerCase();
    const fr = new FileReader();
    if(name.endsWith(".wps")||name.endsWith(".docx")||name.endsWith(".doc")){
        fr.readAsArrayBuffer(file);
        fr.onload=ev=>{
            mammoth.extractRawText({arrayBuffer:ev.target.result})
            .then(res=>{
                reader.innerText = res.value;
                applyColor(); countWord();
            }).catch(()=>reader.innerText="解析失败");
        };
    }else{
        fr.readAsText(file);
        fr.onload=ev=>{
            reader.innerText = ev.result;
            applyColor(); countWord();
        };
    }
});

// 保存（WPS可打开）
function saveLocal(){
    const text = reader.innerText;
    const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="文档_"+Date.now()+".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    alert("✅ 已保存，WPS可打开");
}

// 打印（安卓/苹果支持）
function printDoc(){
    window.print();
}

function alignLeft(){reader.style.textAlign="left";}
function alignCenter(){reader.style.textAlign="center";}
function alignRight(){reader.style.textAlign="right";}
function fontUp(){if(fontSize<42) fontSize++; reader.style.fontSize=fontSize+"px";}
function fontDown(){if(fontSize>12) fontSize--; reader.style.fontSize=fontSize+"px";}

function toggleDark(){
    darkMode=!darkMode;
    document.body.className=currentBg+(darkMode?"dark":"");
    applyColor();
}

function switchEdit(){
    editStatus=!editStatus;
    reader.contentEditable=editStatus;
    editBtn.innerText=editStatus?"✏️":"📝";
    alert(editStatus?"✅ 编辑开启":"❌ 编辑关闭");
}

function checkErrorWords(){
    let t=reader.innerText;
    const fix={"即然":"既然","既使":"即使","渡过":"度过","年青":"年轻","决对":"绝对","以经":"已经","在次":"再次","到至":"导致"};
    let cnt=0;
    for(let k in fix){
        const r=new RegExp(k,"g");
        const m=t.match(r);
        if(m) cnt+=m.length;
        t=t.replace(r,fix[k]);
    }
    reader.innerText=t;
    applyColor(); countWord();
    alert(`修正${cnt}处`);
}

function findText(){
    const k=document.getElementById("findVal").value.trim();
    if(!k) return alert("请输入查找内容");
    const r=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    const t=reader.innerText;
    if(t.match(r)){
        reader.innerHTML=t.replace(r,`<span style="background:#ffeb3b;">${k}</span>`);
    }else alert("未找到");
}

function replaceAll(){
    const f=document.getElementById("findVal").value.trim();
    const r=document.getElementById("replaceVal").value;
    if(!f) return alert("请输入查找内容");
    const reg=new RegExp(f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");
    reader.innerText=reader.innerText.replace(reg,r);
    applyColor(); countWord();
    alert("替换完成");
}

document.getElementById('customColor').onchange=e=>setText(e.target.value);

window.onload=()=>{
    applyColor();
    countWord();
    reader.style.fontSize=fontSize+"px";
};
</script>
</body>
</html>
