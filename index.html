<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艺愈系简洁阅读器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", sans-serif;
            background: #f5f6f7;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #fff;
            padding: 10px;
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            border-bottom: 1px solid #e0e0e0;
        }
        .toolbar {
            background: #fff;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            border-bottom: 1px solid #e0e0e0;
        }
        button {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            background: #2E86AB;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        button:active { opacity: 0.9; }
        select, input {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 13px;
        }
        .stat-bar {
            background: #f0f4f8;
            padding: 6px;
            font-size: 13px;
            text-align: center;
        }
        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .read-box {
            flex: 1;
            margin: 8px;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 16px;
        }
        .trans-panel {
            height: 40vh;
            border-top: 1px solid #e0e0e0;
            background: #fff;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .trans-result {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            background: #fafafa;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 15px;
        }
        .pair-block {
            margin: 8px 0;
            padding: 8px;
            border-bottom: 1px dotted #eee;
        }
        .orig { margin-bottom: 5px; }
        .trans { color: #2E86AB; }
        .dark { background: #121212; color: #eee; }
        #fileInput { display: none; }
    </style>
</head>
<body class="light">
<div class="header">艺愈系简洁阅读器</div>

<div class="toolbar">
    <button onclick="document.getElementById('fileInput').click()">打开</button>
    <button onclick="exportText()">导出</button>
    <button onclick="fontUp()">放大</button>
    <button onclick="fontDown()">缩小</button>
    <button onclick="toggleDark()">夜间</button>
    <select id="fullTransLang">
        <option value="zh">中文</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="ru">俄语</option>
        <option value="fr">法语</option>
    </select>
    <button onclick="fullTranslate()" style="background:#27ae60;">翻译</button>
    <input type="file" id="fileInput" accept=".wps,.docx,.txt">
</div>

<div class="stat-bar">全文：<span id="wordCount">0</span> 字</div>

<div class="main-body">
    <div class="read-box" id="reader" contenteditable="false">
欢迎使用艺愈系简洁阅读器
支持WPS、Word、TXT，手机适配、公众号可用。
    </div>

    <div class="trans-panel">
        <div style="font-weight:bold;margin-bottom:5px;">原文 → 译文</div>
        <div class="trans-result" id="transResult">翻译结果显示区</div>
    </div>
</div>

<script>
const reader = document.getElementById("reader");
const wordCountDom = document.getElementById("wordCount");
const transResult = document.getElementById("transResult");
let fontSize = 16;
let darkMode = false;

// 字数统计
function countWord() {
    let text = reader.innerText.replace(/\s/g, "");
    wordCountDom.innerText = text.length;
}

// 打开文件（WPS/docx/txt不乱码）
document.getElementById('fileInput').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const name = file.name.toLowerCase();
    const readerFile = new FileReader();

    if (name.endsWith(".wps") || name.endsWith(".docx")) {
        readerFile.readAsArrayBuffer(file);
        readerFile.onload = function (ev) {
            mammoth.extractRawText({ arrayBuffer: ev.target.result })
                .then(res => {
                    reader.innerText = res.value;
                    countWord();
                })
                .catch(() => reader.innerText = "文档解析失败");
        };
    } else {
        readerFile.readAsArrayBuffer(file);
        readerFile.onload = function (ev) {
            const buf = new Uint8Array(ev.target.result);
            let t;
            try {
                t = new TextDecoder("utf-8", { fatal: true }).decode(buf);
            } catch (e) {
                t = new TextDecoder("gbk").decode(buf);
            }
            reader.innerText = t;
            countWord();
        };
    }
});

// 导出
function exportText() {
    const blob = new Blob([reader.innerText], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "阅读器文本.txt";
    a.click();
}

// 字体大小
function fontUp() { if (fontSize < 22) fontSize++; reader.style.fontSize = fontSize + "px"; }
function fontDown() { if (fontSize > 14) fontSize--; reader.style.fontSize = fontSize + "px"; }

// 夜间模式
function toggleDark() {
    darkMode = !darkMode;
    document.body.className = darkMode ? "dark" : "light";
}

// 翻译（手机稳定版）
async function fullTranslate() {
    const text = reader.innerText.trim();
    if (!text) return alert("请先输入文本");
    const target = document.getElementById("fullTransLang").value;
    transResult.innerHTML = "翻译中...";

    const sentences = text.split(/(?<=[。！？.!?\n])/).filter(s => s.trim());
    let html = "";

    for (let i = 0; i < sentences.length; i++) {
        const s = sentences[i].trim();
        try {
            const res = await fetch("https://api.muxixiao.com/api/translate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: s, to: target })
            });
            const data = await res.json();
            const t = data.data || "翻译失败";
            html += `<div class="pair-block"><div class="orig">${s}</div><div class="trans">${t}</div></div>`;
        } catch (e) {
            html += `<div class="pair-block"><div class="orig">${s}</div><div class="trans">翻译失败</div></div>`;
        }
        transResult.innerHTML = `进度：${i+1}/${sentences.length}<br><br>` + html;
    }
}

window.onload = countWord;
</script>
</body>
</html>
