<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>艺愈系简洁阅读器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{transition: all 0.3s ease;display:flex;flex-direction:column;height:100vh;font-family: "微软雅黑",sans-serif;}
        .header{
            background:#6c5ce7;
            color:#fff;
            text-align:center;
            padding:12px;
            font-size:18px;
            font-weight:bold;
        }
        .main-body{display:flex;flex:1;overflow:hidden;}
        .main-wrap{flex:1;display:flex;flex-direction:column;}
        .toolbar{
            background: #f8f9fa;
            padding:10px;
            display:flex;
            gap:6px;
            flex-wrap:wrap;
            justify-content:center;
            align-items:center;
            border-bottom:1px solid #ddd;
        }
        .stat-bar{
            background:#eef5ff;
            padding:6px 15px;
            text-align:center;
            font-size:14px;
            color:#222;
        }
        .search-box{padding:8px;background:#f5f5f5;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
        button{
            padding:6px 10px;
            border:none;
            border-radius:5px;
            background:#6c5ce7;
            color:white;
            cursor:pointer;
            font-size:13px;
        }
        button:hover{opacity:0.9;}
        select,input{padding:5px;border-radius:4px;border:1px solid #ccc;font-size:13px;}
        #fileInput{display:none;}
        .read-box{
            flex:1;
            margin:10px;
            padding:20px;
            line-height:2;
            overflow-y:auto;
            border-radius:10px;
            white-space:pre-wrap;
            user-select:text;
            outline:none;
        }
        .trans-panel{
            width:460px;
            height:100vh;
            border-left:1px solid #ccc;
            padding:15px;
            display:flex;
            flex-direction:column;
            background:#fdfdfd;
        }
        .trans-result{
            flex:1;
            border:1px solid #ddd;
            padding:15px;
            overflow-y:auto;
            line-height:1.8;
        }
        .pair-block{
            margin:10px 0;
            padding:10px;
            border-bottom:1px dotted #eee;
        }
        .orig{margin-bottom:8px;font-weight:500;}
        .trans{color:#0055cc;}
        .light{background:#ffffff;color:#333;}
        .dark{background:#121212;color:#eee;}
    </style>
</head>
<body class="light">
<div class="header">艺愈系简洁阅读器</div>
<div class="main-body">
    <div class="main-wrap">
        <div class="toolbar">
            <button onclick="document.getElementById('fileInput').click()">打开文档</button>
            <button onclick="exportText()">导出文本</button>
            <button onclick="fontUp()">放大字体</button>
            <button onclick="fontDown()">缩小字体</button>
            <button onclick="toggleDark()">昼夜模式</button>
            <button onclick="alignLeft()">左对齐</button>
            <button onclick="alignCenter()">居中</button>
            <button onclick="alignRight()">右对齐</button>
            <button onclick="checkErrorWords()">错别字修正</button>
            <button onclick="switchEdit()">编辑模式</button>

            <select id="fullTransLang">
                <option value="zh">中文</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="ru">俄语</option>
                <option value="fr">法语</option>
                <option value="pt">葡萄牙语</option>
                <option value="ar">阿拉伯语</option>
            </select>
            <button onclick="fullTranslate()" style="background:#27ae60;">全文对照翻译</button>

            <select id="fontSelect"></select>
            <input type="color" id="textColor" title="字体颜色">
            <input type="file" id="fileInput" accept=".txt,.doc,.docx">
        </div>

        <div class="search-box">
            <input type="text" id="findVal" placeholder="查找内容" style="flex:1;">
            <input type="text" id="replaceVal" placeholder="替换为" style="flex:1;">
            <button onclick="findText()">查找</button>
            <button onclick="replaceAll()">全部替换</button>
        </div>

        <div class="stat-bar">全文总字数：<span id="wordCount">0</span> 字</div>

        <div class="read-box" id="reader" contenteditable="false">
欢迎使用艺愈系简洁阅读器
支持多语言对照翻译、字体设置、颜色自定义、查找替换。
所有功能可在公众号/浏览器正常使用。
        </div>
    </div>

    <div class="trans-panel">
        <div style="font-weight:bold;margin-bottom:10px;">原文 ↓ 译文对照</div>
        <div class="trans-result" id="transResult">翻译结果将在此显示</div>
    </div>
</div>

<script>
const fonts = ["微软雅黑","宋体","黑体","楷体","隶书","幼圆","仿宋"];
const reader = document.getElementById("reader");
const fontSel = document.getElementById("fontSelect");
const wordCountDom = document.getElementById("wordCount");
const transResult = document.getElementById("transResult");
let fontSize = 17;
let darkMode = false;
let editStatus = false;
let textColor = "#333";

fonts.forEach(f => {
    let opt = document.createElement("option");
    opt.value = f;
    opt.innerText = f;
    fontSel.appendChild(opt);
});

function applyColor() {
    reader.style.color = textColor;
}

function countWord() {
    let text = reader.innerText.replace(/\s/g, "");
    wordCountDom.innerText = text.length;
}

// 修复乱码：自动检测 UTF-8/GBK
document.getElementById('fileInput').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const readerFile = new FileReader();
    readerFile.onload = function(ev) {
        const array = new Uint8Array(ev.target.result);
        // 简单编码判断
        let isUTF8 = true;
        for (let i = 0; i < array.length; i++) {
            if (array[i] > 127) {
                if ((array[i] & 0xE0) === 0xC0 && (array[i+1] & 0xC0) === 0x80) {
                    i++;
                } else {
                    isUTF8 = false;
                    break;
                }
            }
        }
        const text = isUTF8 
            ? new TextDecoder("utf-8").decode(array)
            : new TextDecoder("gbk").decode(array);
        reader.innerText = text;
        applyColor();
        countWord();
    };
    readerFile.readAsArrayBuffer(file);
});

function exportText() {
    const blob = new Blob([reader.innerText], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "艺愈阅读器文稿.txt";
    a.click();
}

function alignLeft() { reader.style.textAlign = "left"; }
function alignCenter() { reader.style.textAlign = "center"; }
function alignRight() { reader.style.textAlign = "right"; }

function fontUp() { if (fontSize < 40) fontSize++; reader.style.fontSize = fontSize + "px"; }
function fontDown() { if (fontSize > 12) fontSize--; reader.style.fontSize = fontSize + "px"; }

function toggleDark() {
    darkMode = !darkMode;
    document.body.className = darkMode ? "dark" : "light";
}

function switchEdit() {
    editStatus = !editStatus;
    reader.contentEditable = editStatus;
    alert(editStatus ? "已开启编辑" : "已关闭编辑");
}

function checkErrorWords() {
    let text = reader.innerText;
    const fix = {
        "即然":"既然","既使":"即使","渡过":"度过","年青":"年轻",
        "决对":"绝对","以经":"已经","在次":"再次","到至":"导致",
        "气份":"气氛","烦脑":"烦恼","座下":"坐下"
    };
    for (let k in fix) text = text.replaceAll(k, fix[k]);
    reader.innerText = text;
    applyColor();
    countWord();
    alert("修正完成");
}

function findText() {
    const key = document.getElementById("findVal").value.trim();
    if (!key) return alert("请输入查找内容");
    reader.innerHTML = reader.innerText.replaceAll(key, `<span style="background:#ffeb3b;">${key}</span>`);
}

function replaceAll() {
    const f = document.getElementById("findVal").value;
    const r = document.getElementById("replaceVal").value;
    if (!f) return alert("请输入查找内容");
    reader.innerText = reader.innerText.replaceAll(f, r);
    applyColor();
    countWord();
    alert("替换完成");
}

fontSel.onchange = () => {
    reader.style.fontFamily = fontSel.value;
};

document.getElementById('textColor').onchange = () => {
    textColor = document.getElementById('textColor').value;
    applyColor();
};

// 全网稳定翻译
async function fullTranslate() {
    const text = reader.innerText.trim();
    if (!text) return alert("请先输入文本");
    const target = document.getElementById("fullTransLang").value;
    transResult.innerHTML = "翻译中...";

    const sentences = text.split(/(?<=[。！？.!?\n])/).filter(s => s.trim());
    let html = "";

    for (let i = 0; i < sentences.length; i++) {
        const s = sentences[i].trim();
        try {
            const res = await fetch("https://api.muxixiao.com/api/translate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: s, to: target })
            });
            const data = await res.json();
            const t = data.data || "翻译失败";
            html += `
            <div class="pair-block">
                <div class="orig">${s}</div>
                <div class="trans">${t}</div>
            </div>`;
        } catch (e) {
            html += `
            <div class="pair-block">
                <div class="orig">${s}</div>
                <div class="trans">翻译失败</div>
            </div>`;
        }
        transResult.innerHTML = `进度：${i + 1}/${sentences.length}<br><br>` + html;
    }
}

window.onload = () => {
    applyColor();
    countWord();
};
</script>
</body>
</html>
